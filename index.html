<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1923" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AnestheMemo" />
  <title>AnestheMemo</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />

  <!-- ======================================================
       🔥 FIREBASE CONFIG — 이 부분을 본인의 Firebase 프로젝트 설정으로 교체하세요.
       Firebase Console → 프로젝트 설정 → 앱 추가(웹) → SDK 설정에서 복사
       ====================================================== -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, doc, addDoc, getDocs, updateDoc, deleteDoc,
             query, orderBy, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ✏️ 아래 값들을 본인의 Firebase 프로젝트 값으로 교체하세요
    const firebaseConfig = {
      apiKey:            "AIzaSyBahyCwpwASfNvsiQjs70-u3YAOE4kMK6A",
      authDomain:        "anesnote-5051d.firebaseapp.com",
      projectId:         "anesnote-5051d",
      storageBucket:     "anesnote-5051d.firebasestorage.app",
      messagingSenderId: "469739291392",
      appId:             "1:469739291392:web:c3cda9992f02c0b2b8e9e5"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // app.js에서 접근할 수 있도록 window에 노출
    window.__firebase = { auth, db, GoogleAuthProvider, signInWithPopup, signOut,
                          onAuthStateChanged, collection, doc, addDoc, getDocs,
                          updateDoc, deleteDoc, query, orderBy, serverTimestamp };
  </script>
</head>
<body>
  <!-- 로그인 화면 -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-icon">⚕</span>
        <h1>AnestheMemo</h1>
        <p>마취 필수 메모 관리</p>
      </div>
      <button id="google-login-btn" class="btn-google">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google로 로그인
      </button>
    </div>
  </div>

  <!-- 메인 앱 -->
  <div id="app" style="display:none">
    <header class="app-header">
      <div class="header-left">
        <span class="header-icon">⚕</span>
        <span class="header-title">AnestheMemo</span>
      </div>
      <div class="header-right">
        <img id="user-avatar" src="" alt="avatar" />
        <span id="user-name"></span>
        <button id="logout-btn" class="btn-icon" title="로그아웃">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="main-layout">
      <!-- 사이드바 메모 목록 -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>메모 목록</h2>
          <button id="new-memo-btn" class="btn-primary btn-sm">+ 새 메모</button>
        </div>
        <ul id="memo-list"></ul>
      </aside>

      <!-- 메모 상세 / 편집 -->
      <section class="memo-detail">
        <div id="empty-state" class="empty-state">
          <span>📋</span>
          <p>메모를 선택하거나<br/>새 메모를 작성하세요</p>
        </div>

        <!-- BMI 계산기 (고정 빌트인 메모) -->
        <div id="bmi-view" class="memo-view" style="display:none">
          <div class="memo-view-header">
            <h2>🧮 BMI 계산기</h2>
            <span class="badge-builtin">기본 메모</span>
          </div>
          <div class="bmi-card">
            <div class="bmi-inputs">
              <label>
                키 (m)
                <input type="number" id="bmi-height" placeholder="예: 1.70" step="0.01" min="0.5" max="2.5" />
              </label>
              <label>
                몸무게 (kg)
                <input type="number" id="bmi-weight" placeholder="예: 65" step="0.1" min="1" max="300" />
              </label>
            </div>
            <button id="bmi-calc-btn" class="btn-primary">계산하기</button>
            <div id="bmi-result" class="bmi-result" style="display:none">
              <div class="bmi-number" id="bmi-value">--</div>
              <div class="bmi-label" id="bmi-label">--</div>
              <div class="bmi-bar-wrap">
                <div class="bmi-bar">
                  <div class="bmi-bar-fill" id="bmi-bar-fill"></div>
                  <div class="bmi-bar-marker" id="bmi-bar-marker"></div>
                </div>
                <div class="bmi-bar-labels">
                  <span>저체중<br/>&lt;18.5</span>
                  <span>정상<br/>18.5–22.9</span>
                  <span>과체중<br/>23–24.9</span>
                  <span>비만<br/>≥25</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 사용자 메모 보기 -->
        <div id="user-memo-view" class="memo-view" style="display:none">
          <div class="memo-view-header">
            <h2 id="view-title"></h2>
            <div class="memo-actions">
              <button id="edit-btn" class="btn-secondary btn-sm">편집</button>
              <button id="delete-btn" class="btn-danger btn-sm">삭제</button>
            </div>
          </div>
          <div id="view-content" class="memo-content-view"></div>
          <div class="memo-meta" id="view-meta"></div>
        </div>

        <!-- 메모 작성/편집 폼 -->
        <div id="memo-form" class="memo-view" style="display:none">
          <div class="memo-view-header">
            <h2 id="form-title-label">새 메모</h2>
            <div class="memo-actions">
              <button id="cancel-btn" class="btn-secondary btn-sm">취소</button>
              <button id="save-btn" class="btn-primary btn-sm">저장</button>
            </div>
          </div>
          <div class="form-group">
            <input type="text" id="memo-title" placeholder="제목을 입력하세요" class="input-title" maxlength="80" />
          </div>
          <div class="form-group">
            <textarea id="memo-content" placeholder="내용을 입력하세요..." class="input-content"></textarea>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- 삭제 확인 모달 -->
  <div id="confirm-modal" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <div class="modal-icon">🗑️</div>
      <h3>메모를 삭제할까요?</h3>
      <p id="confirm-memo-title" class="modal-subtitle"></p>
      <p class="modal-desc">삭제된 메모는 복구할 수 없습니다.</p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn-secondary">취소</button>
        <button id="modal-confirm" class="btn-danger">삭제</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
